<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">MacBridge app icon</title>
  <desc id="desc">A modern macOS icon showing a bridge between a Windows-style key and a Command key.</desc>
  <defs>
    <linearGradient id="bg" x1="145" y1="96" x2="879" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FBFF"/>
      <stop offset="0.42" stop-color="#CBE9FF"/>
      <stop offset="1" stop-color="#8BA9FF"/>
    </linearGradient>
    <linearGradient id="bridge" x1="210" y1="372" x2="814" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22C7D8"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="key" x1="512" y1="338" x2="512" y2="604" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EDF4FA"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#16345D" flood-opacity="0.22"/>
    </filter>
    <filter id="bridgeGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#38BDF8" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="72" y="72" width="880" height="880" rx="210" fill="url(#bg)"/>
  <path d="M166 719c105 73 246 110 403 82 127-23 221-89 292-195v221c0 42-34 76-76 76H239c-42 0-76-34-76-76z" fill="#3455B7" opacity="0.14"/>

  <path d="M251 471C314 303 425 220 512 220s198 83 261 251" fill="none" stroke="#243B73" stroke-width="92" stroke-linecap="round" opacity="0.16"/>
  <path d="M251 471C314 303 425 220 512 220s198 83 261 251" fill="none" stroke="url(#bridge)" stroke-width="64" stroke-linecap="round" filter="url(#bridgeGlow)"/>

  <rect x="164" y="619" width="696" height="184" rx="54" fill="#15345A" opacity="0.18"/>
  <rect x="188" y="584" width="648" height="190" rx="48" fill="#1D3557" opacity="0.92"/>
  <rect x="224" y="623" width="576" height="52" rx="18" fill="#EAF3FA" opacity="0.18"/>

  <g filter="url(#softShadow)">
    <rect x="178" y="386" width="252" height="224" rx="58" fill="url(#key)"/>
    <rect x="594" y="386" width="252" height="224" rx="58" fill="url(#key)"/>
  </g>

  <g fill="#255D91">
    <rect x="262" y="457" width="36" height="36" rx="6"/>
    <rect x="312" y="457" width="36" height="36" rx="6"/>
    <rect x="262" y="507" width="36" height="36" rx="6"/>
    <rect x="312" y="507" width="36" height="36" rx="6"/>
  </g>

  <path d="M395 500h234" stroke="#31B8E8" stroke-width="34" stroke-linecap="round"/>
  <path d="M596 463l52 37-52 37" fill="none" stroke="#31B8E8" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M428 537l-52-37 52-37" fill="none" stroke="#31B8E8" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="720" y="540" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="132" font-weight="650" fill="#1C3352">⌘</text>
</svg>
